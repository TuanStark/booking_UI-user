version: '3.9'

services:
  booking-ui-user:
    container_name: booking-ui-user
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Trình duyệt gọi agent qua máy host — không dùng hostname container (booking-agent)
        NEXT_PUBLIC_AGENT_API_URL: ${NEXT_PUBLIC_AGENT_API_URL:-http://localhost:3012/api/v1/super-agent/query}
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      my_custom_network:
        ipv4_address: ${APP_IP}

networks:
  my_custom_network:
    external: true
